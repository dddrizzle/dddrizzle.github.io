<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        /* This is the CSS that makes it look good */
        body {
            background-color: #1a1a2e;
            color: #e94560;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #16213e;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 85%;
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: #ffffff;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #a2a8d3;
            margin-bottom: 20px;
        }
        .heart {
            font-size: 60px;
            animation: heartbeat 1.5s infinite;
            margin: 20px 0;
        }
        /* The heartbeat animation */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.2); }
            40% { transform: scale(1); }
            60% { transform: scale(1.2); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- This is the text she will actually see -->
    <div class="container">
        <h1>Hey [Her Name],</h1>
        
        <div class="heart">❤️</div>
        
        <p>We might be miles apart, but I wanted to make something special just for you.</p>
        
        <p>I usually stick to backend engineering, but you are the only person who could get me to write HTML.</p>

        <p>You are the best study partner and the perfect half to our mutualistic symbiosis. 🦠🔬</p>
    </div>
</body>
</html>
